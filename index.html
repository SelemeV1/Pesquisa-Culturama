<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/Pesquisa-Culturama/culturama-favico.png" />
    <link rel="stylesheet" href="./Css/styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap"
      rel="stylesheet"
    />
    <title>Pesquisa de Opinião</title>
  </head>
  <body>
    <main>
      <header>
        <img src="/Img/logo-culturama.png" alt="Logo Culturama" />
        <h1>Pesquisa Online</h1>
      </header>
      <section>
        <form action="sucesso.html" method="get">
          <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="name">Nome</label>
            <input id="name" type="text" name="userName" required />
            <br />
            <label for="age">Idade</label>
            <input
              id="age"
              type="number"
              name="userAge"
              min="12"
              max="100"
              required
            />
            <br />
            <label for="birthdate">Data de nascimento</label>
            <input id="birthdate" type="date" name="userBirthDate" />
            <br />
            <label for="email">Email</label>
            <input id="email" type="email" name="userEmail" required />
            <br />
            <label for="phone">Telefone</label>
            <input
              id="phone"
              type="tel"
              name="userPhoneNumber"
              pattern="[0-9]{11}"
              placeholder="DDD+ Número"
              aria-describedby="phoneHelp"
              required
            />
            <small id="phoneHelp"
              >Preencha com 11 dígitos no formato: DDD + Número sem espaços ou
              hífen.</small
            >
            <br />
            <label for="image">Upload de foto</label>
            <input
              id="image"
              type="file"
              accept="image/*"
              name="userImage"
              aria-describedby="imageHelp"
            />
            <small id="imageHelp">Envie uma foto no formato PNG ou JPEG</small>
            <br />
          </fieldset>
          <fieldset>
            <legend>Perfil</legend>

            <p>Gênero:</p>
            <input id="fem" type="radio" name="userGender" value="Feminino" />
            <label for="fem">Feminino</label>
            <input id="masc" type="radio" name="userGender" value="Masculino" />
            <label for="masc">Masculino</label>
            <input
              id="notInformed"
              type="radio"
              name="userGender"
              value="userNotInformed"
            />
            <label for="notInformed">Perefiro não informar</label>
            <br />

            <label for="martialStatus">Estado civil:</label>
            <select id="martialStatus" name="userMartialStatus">
              <option value="" selected disabled>Selecione...</option>
              <option value="casado">Casado</option>
              <option value="solteiro">Solteiro</option>
              <option value="divorciado">Divorciado</option>
              <option value="casado">União estável</option>
            </select>
            <br />

            <label for="state">Estado:</label>
            <select id="state" name="userState" required>
              <option value="" selected disabled>Escolha um estado...</option>
              <option value="AC">Acre</option>
              <option value="AL">Alagoas</option>
              <option value="AP">Amapá</option>
              <option value="AM">Amazonas</option>
              <option value="BA">Bahia</option>
              <option value="CE">Ceará</option>
              <option value="DF">Distrito Federal</option>
              <option value="ES">Espírito Santo</option>
              <option value="GO">Goiás</option>
              <option value="MA">Maranhão</option>
              <option value="MT">Mato Grosso</option>
              <option value="MS">Mato Grosso do Sul</option>
              <option value="MG">Minas Gerais</option>
              <option value="PA">Pará</option>
              <option value="PB">Paraíba</option>
              <option value="PR">Paraná</option>
              <option value="PE">Pernambuco</option>
              <option value="PI">Piauí</option>
              <option value="RJ">Rio de Janeiro</option>
              <option value="RN">Rio Grande do Norte</option>
              <option value="RS">Rio Grande do Sul</option>
              <option value="RO">Rondônia</option>
              <option value="RR">Roraima</option>
              <option value="SC">Santa Catarina</option>
              <option value="SP">São Paulo</option>
              <option value="SE">Sergipe</option>
              <option value="TO">Tocantins</option>
            </select>

            <label for="city">Cidade:</label>
            <input
              id="city"
              type="text"
              name="userCity"
              placeholder="Digite o nome da sua cidade"
              autocomplete="address-level2"
            />
          </fieldset>
          <fieldset>
            <legend>Hábitos</legend>
            <p>Redes Sociais:</p>
            <input
              id="instagram"
              type="checkbox"
              name="userSocial"
              value="instagram"
            />
            <label for="instagram">Instagram</label>
            <br />
            <input
              id="facebook"
              type="checkbox"
              name="userSocial"
              value="facebook"
            />
            <label for="facebook">Facebook</label>
            <br />
            <input
              id="linkedin"
              type="checkbox"
              name="userSocial"
              value="linkedin"
            />
            <label for="linkedin">Linkedin</label>
            <br />
            <input id="x" type="checkbox" name="userSocial" value="x" />
            <label for="x">X</label>
            <br />
            <input
              id="tiktok"
              type="checkbox"
              name="userSocial"
              value="tiktok"
            />
            <label for="tiktok">Tik Tok</label>
            <br />
            <label for="musicStyle">Estilo musical:</label>
            <input
              list="styleType"
              type="text"
              name="userMusicStyle"
              id="musicStyle"
            />
            <datalist id="styleType">
              <option value="Rock"></option>
              <option value="Pop"></option>
              <option value="Samba"></option>
              <option value="Sertanejo"></option>
              <option value="Funk"></option>
            </datalist>
            <br />
            <label for="favoriteColor">Cor favorita:</label>
            <input
              list="simpleColors"
              type="color"
              name="userFavoriteColor"
              id="favoriteColor"
            />
            <datalist id="simpleColors">
              <option value="#FF0000">Vermelho</option>
              <option value="#00FF00">Verde</option>
              <option value="#0000FF">Azul</option>
              <option value="#FFFF00">Amarelo</option>
              <option value="#FFA500">Laranja</option>
              <option value="#800080">Roxo</option>
              <option value="#000000">Preto</option>
              <option value="#FFFFFF">Branco</option>
            </datalist>
          </fieldset>
          <fieldset>
            <legend>Satisfação</legend>
            <p>O que você acha da nossa qualidade de serviço?</p>

            <input
              type="radio"
              name="userSatisfy"
              id="satisfy_perfect"
              value="perfect"
            />
            <label for="satisfy_perfect">Ótima</label><br />

            <input
              type="radio"
              name="userSatisfy"
              id="satisfy_good"
              value="good"
            />
            <label for="satisfy_good">Boa</label><br />

            <input
              type="radio"
              name="userSatisfy"
              id="satisfy_regular"
              value="regular"
            />
            <label for="satisfy_regular">Regular</label><br />

            <input
              type="radio"
              name="userSatisfy"
              id="satisfy_bad"
              value="bad"
            />
            <label for="satisfy_bad">Ruim</label><br />
            <br />
            <label for="comment">Escreva sua opinião:</label><br />
            <textarea
              name="userComments"
              id="comment"
              rows="4"
              placeholder="Escreva seu comentário aqui..."
            ></textarea>
          </fieldset>

          <fieldset>
            <legend>Confirmações</legend>
            <input
              type="checkbox"
              name="userLgpd"
              id="userLgpdTerm"
              value="confirmed"
              required
            />
            <label for="userLgpdTerm">Eu aceito participar da pesquisa</label
            ><br />
            <input
              type="checkbox"
              name="userGetResult"
              id="getResult"
              value="confirmed"
            />
            <label for="getResult">Desejo receber oresultado por e-mail</label
            ><br />
          </fieldset>

          <button type="submit" aria-label="Enviar dados do formulário">
            Enviar
          </button>
          <button type="reset" aria-label="Limpas dados do fotumulário">
            Limpar
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
