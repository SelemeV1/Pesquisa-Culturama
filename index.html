<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./Css/styles.css" />
    <title>Pesquisa Culturama</title>
  </head>
  <body>
    <header>
      <h1>Pesquisa Online</h1>
    </header>
    <section>
      <form action="" method="get">
        <fieldset>
          <legend>Dados Pessoais</legend>

          <label for="name">Nome</label>
          <input id="name" type="text" name="userName" required />
          <br />
          <label for="age">Idade</label>
          <input
            id="age"
            type="number"
            name="userAge"
            min="12"
            max="100"
            required
          />
          <br />
          <label for="birthdate">Data de nascimento</label>
          <input id="birthdate" type="date" name="userBirthDate" />
          <br />
          <label for="email">Email</label>
          <input id="email" type="email" name="userEmail" required />
          <br />
          <label for="phone">Telefone</label>
          <input
            id="phone"
            type="tel"
            name="userPhoneNumber"
            pattern="[0-9] {11}"
            placeholder="DDD+ Número"
            required
          />
          <br />
          <label for="image">Upload de foto</label>
          <input id="image" type="file" accept="image/*" name="userImage" />
          <br />
        </fieldset>
        <fieldset>
          <legend>Perfil</legend>

          <p>Gênero:</p>
          <input id="fem" type="radio" name="userGender" value="Feminino" />
          <label for="fem">Feminino</label>
          <input id="masc" type="radio" name="userGender" value="Masculino" />
          <label for="masc">Masculino</label>
          <input
            id="notInformed"
            type="radio"
            name="userGender"
            value="userNotInformed"
          />
          <label for="notInformed">Perefiro não informar</label>
          <br />

          <label for="martialStatus">Estado civil:</label>
          <select id="martialStatus" name="userMartialStatus">
            <option value="" selected disabled>Selecione...</option>
            <option value="casado">Casado</option>
            <option value="solteiro">Solteiro</option>
            <option value="divorciado">Divorciado</option>
            <option value="casado">União estável</option>
          </select>
          <br />

          <label for="state">Estado:</label>
          <select id="state" name="userState" required>
            <option value="" selected disabled>Escolha um estado...</option>
            <option value="AC">Acre</option>
            <option value="AL">Alagoas</option>
            <option value="AP">Amapá</option>
            <option value="AM">Amazonas</option>
            <option value="BA">Bahia</option>
            <option value="CE">Ceará</option>
            <option value="DF">Distrito Federal</option>
            <option value="ES">Espírito Santo</option>
            <option value="GO">Goiás</option>
            <option value="MA">Maranhão</option>
            <option value="MT">Mato Grosso</option>
            <option value="MS">Mato Grosso do Sul</option>
            <option value="MG">Minas Gerais</option>
            <option value="PA">Pará</option>
            <option value="PB">Paraíba</option>
            <option value="PR">Paraná</option>
            <option value="PE">Pernambuco</option>
            <option value="PI">Piauí</option>
            <option value="RJ">Rio de Janeiro</option>
            <option value="RN">Rio Grande do Norte</option>
            <option value="RS">Rio Grande do Sul</option>
            <option value="RO">Rondônia</option>
            <option value="RR">Roraima</option>
            <option value="SC">Santa Catarina</option>
            <option value="SP">São Paulo</option>
            <option value="SE">Sergipe</option>
            <option value="TO">Tocantins</option>
          </select>
          <br />

          <label for="city">Cidade:</label>
          <input
            id="city"
            type="text"
            name="userCity"
            placeholder="Digite o nome da sua cidade"
            autocomplete="address-level2"
          />
        </fieldset>

        <fieldset>
          <legend>Hábitos</legend>
          <p>Redes Sociais:</p>
          <input
            id="instagram"
            type="checkbox"
            name="userSocial"
            value="instagram"
          />
          <label for="instagram">Instagram</label>
          <br />
          <input
            id="facebook"
            type="checkbox"
            name="userSocial"
            value="facebook"
          />
          <label for="facebook">Facebook</label>
          <br />
          <input
            id="linkedin"
            type="checkbox"
            name="userSocial"
            value="linkedin"
          />
          <label for="linkedin">Linkedin</label>
          <br />
          <input id="x" type="checkbox" name="userSocial" value="x" />
          <label for="x">X</label>
          <br />
          <input id="tiktok" type="checkbox" name="userSocial" value="tiktok" />
          <label for="tiktok">Tik Tok</label>
        </fieldset>

        <button type="submit">Enviar</button>
      </form>
    </section>
  </body>
</html>
